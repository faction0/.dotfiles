<script>
    const body = document.querySelector('body')

    function newitem(url, text) {
        const a = document.createElement('a');

        a.href        = url;
        a.textContent = text;

        a.target = "_blank"
        a.rel    = "noopener noreferrer"

       body.appendChild(a);
       body.appendChild(document.createElement('br'));
    }

    x = 'https://www.nexusmods.com/stardewvalley/mods/'

    newitem( `${x}20042` , 'horse'            )
    newitem( `${x}20159` , 'animation cancel' )

    newitem( `${x}1915`  , 'patcher'          )
    newitem( `${x}239`   , 'npc location'     )
    newitem( `${x}5098`  , 'config menu'      )
    newitem( `${x}5450`  , 'season art'       )
    newitem( `${x}2544`  , 'more dialogue'    )

</script>
